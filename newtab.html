<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="newtab.css">
</head>
<body class="theme-system">

  <!-- Dynamic Background Wallpaper -->
  <div id="wallpaper-bg" class="wallpaper-container"></div>
  <div id="wallpaper-overlay" class="wallpaper-overlay"></div>

  <!-- Main Grid Workspace -->
  <div class="dashboard-wrapper">
    
    <!-- Top Row Layout: Search (Left) and Clock (Right) -->
    <div class="top-row-layout">
      
      <!-- Search Section -->
      <section class="search-section fade-in-delay-1" id="widget-search-section">
        <div class="search-container">
          <form id="search-form" class="search-form-wrapper">
            <div class="search-icon-wrapper">
              <svg class="icon search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </div>
            <input type="text" id="search-input" placeholder="Search or enter website name" autocomplete="off" spellcheck="false">
          </form>
          <!-- Search History Dropdown -->
          <div id="search-history-dropdown" class="search-history-dropdown" style="display: none;">
            <ul id="search-history-list" class="search-history-list"></ul>
            <div class="search-history-footer">
              <button id="search-history-clear-btn" class="clear-history-btn" type="button">Clear History</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Top Header: Greeting, Clock & Date -->
      <header class="dashboard-header fade-in" id="widget-clock-section">
        <div class="clock-container">
          <h1 id="clock-text" class="clock-display">00:00</h1>
          <div class="clock-details">
            <span id="clock-ampm" class="clock-ampm">AM</span>
            <p id="date-text" class="date-display">Monday, January 1</p>
          </div>
        </div>
        <div class="greeting-container">
          <h2 id="greeting-text" class="greeting-title">Good Morning</h2>
        </div>
      </header>

    </div>

    <!-- Dashboard Content Widgets Grid -->
    <main class="dashboard-main fade-in-delay-2">
      
      <!-- Section: Favourites (Bookmarks) -->
      <section class="mac-section" id="section-favourites">
        <div class="section-header">
          <h2>Favourites</h2>
        </div>
        <!-- Breadcrumbs -->
        <div id="bookmarks-nav" class="bookmarks-breadcrumbs" style="display: none;"></div>
        
        <div class="favourites-grid" id="bookmarks-grid">
          <div class="loading-spinner">Loading...</div>
        </div>
      </section>

      <!-- Section: Suggestions (Shortcuts) -->
      <section class="mac-section" id="section-suggestions">
        <div class="section-header">
          <h2>Suggestions</h2>
        </div>
        <div class="suggestions-grid" id="shortcuts-grid">
          <!-- Populated dynamically -->
        </div>
      </section>

    </main>
  </div>

  <!-- Edit Float Button (Bottom Right) -->
  <button id="settings-trigger-btn" class="edit-float-btn" aria-label="Settings">
    Edit
  </button>

  <!-- Settings Drawer / Sidebar -->
  <aside id="settings-drawer" class="settings-drawer-panel">
    <div class="settings-drawer-header">
      <h2>Start Page Settings</h2>
      <button id="settings-close-btn" class="settings-close-btn" aria-label="Close settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
      </button>
    </div>
    
    <div class="settings-drawer-content">
      <div class="settings-group">
        <h3>Theme & Style</h3>
        <div class="settings-control">
          <label for="settings-theme">Appearance</label>
          <select id="settings-theme" class="mac-select">
            <option value="system">Auto</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>

        <div class="settings-control checkbox-control">
          <label for="settings-animations">Enable Animations</label>
          <div class="toggle-switch">
            <input type="checkbox" id="settings-animations" checked>
            <span class="slider"></span>
          </div>
        </div>
      </div>

      <div class="settings-group">
        <h3>Background Image</h3>
        <div class="wallpaper-selector-grid"></div>
        <div class="wallpaper-upload-box">
          <label for="wallpaper-upload-input" class="mac-btn w-100 text-center">
            Upload Custom Image
          </label>
          <input type="file" id="wallpaper-upload-input" accept="image/png, image/jpeg, image/webp" style="display: none;">
        </div>
      </div>
    </div>
  </aside>

  <!-- Add/Edit Suggestion Modal -->
  <div id="suggestion-modal-overlay" class="modal-overlay" style="display: none;">
    <div class="suggestion-modal glass-modal">
      <div class="modal-header">
        <h3 id="suggestion-modal-title">Add Suggestion</h3>
        <button id="suggestion-modal-close" class="modal-close-btn" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <form id="suggestion-form" class="modal-body">
        <input type="hidden" id="suggestion-id">
        <div class="form-group">
          <label for="suggestion-name">Website Name</label>
          <input type="text" id="suggestion-name" class="modal-input" placeholder="e.g. Netflix" required>
        </div>
        <div class="form-group">
          <label for="suggestion-url">Website URL</label>
          <input type="url" id="suggestion-url" class="modal-input" placeholder="e.g. https://netflix.com" required>
        </div>
        <div class="modal-actions">
          <button type="button" id="suggestion-delete-btn" class="modal-btn btn-danger" style="display: none;">Delete</button>
          <div class="action-right">
            <button type="button" id="suggestion-cancel-btn" class="modal-btn btn-secondary">Cancel</button>
            <button type="submit" class="modal-btn btn-primary">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Javascript Modules -->
  <script type="module" src="newtab.js"></script>
</body>
</html>
