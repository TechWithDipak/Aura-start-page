<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Heavy blur filter for smooth glowing transition -->
    <filter id="aurora-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="90" result="blur" />
    </filter>
    
    <linearGradient id="sky-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#02000c" />
      <stop offset="50%" stop-color="#05081b" />
      <stop offset="100%" stop-color="#0b1736" />
    </linearGradient>
  </defs>

  <!-- Dark sky background -->
  <rect width="1920" height="1080" fill="url(#sky-dark)" />

  <!-- Stars (small random circles) -->
  <g fill="#ffffff" opacity="0.3">
    <circle cx="150" cy="120" r="1" />
    <circle cx="280" cy="300" r="1.5" />
    <circle cx="450" cy="80" r="1" />
    <circle cx="620" cy="220" r="2" />
    <circle cx="780" cy="150" r="1" />
    <circle cx="950" cy="280" r="1.5" />
    <circle cx="1100" cy="90" r="1" />
    <circle cx="1320" cy="210" r="2" />
    <circle cx="1540" cy="140" r="1.5" />
    <circle cx="1700" cy="320" r="1" />
    <circle cx="1850" cy="80" r="2" />
  </g>

  <!-- Glowing Aurora Flows with Filter -->
  <g filter="url(#aurora-blur)" opacity="0.6">
    <!-- Green Flow -->
    <path d="M-100 300 Q 300 100 800 400 T 1700 200 Q 1850 150 2020 300 L 2020 900 L -100 900 Z" fill="#00ff9d" />
    
    <!-- Blue/Purple Flow -->
    <path d="M-100 400 Q 400 600 900 200 T 1900 500 Q 2000 550 2020 500 L 2020 900 L -100 900 Z" fill="#7f00ff" />
    
    <!-- Neon Turquoise Accent -->
    <path d="M 200 200 Q 700 500 1200 300 T 1800 400 L 1920 900 L 0 900 Z" fill="#00d2ff" opacity="0.8" />

    <!-- Soft Orange Horizon Glow -->
    <ellipse cx="960" cy="1000" rx="900" ry="250" fill="#ff5e3a" opacity="0.4" />
  </g>

  <!-- Dark mountain silhouette at bottom (gives perspective) -->
  <path d="M-50 1080 L-50 1000 Q200 960 500 1010 T1100 990 Q1500 940 1970 1020 L1970 1080 Z" fill="#03040c" />
</svg>
