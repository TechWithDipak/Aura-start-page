<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Background dark gradient -->
    <linearGradient id="dark-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c" />
      <stop offset="50%" stop-color="#141419" />
      <stop offset="100%" stop-color="#050507" />
    </linearGradient>

    <!-- Obsidian waves linear gradients -->
    <linearGradient id="wave-dark-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d1d24" />
      <stop offset="50%" stop-color="#131317" />
      <stop offset="100%" stop-color="#09090c" />
    </linearGradient>

    <linearGradient id="wave-dark-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a35" />
      <stop offset="50%" stop-color="#1a1a21" />
      <stop offset="100%" stop-color="#0f0f13" />
    </linearGradient>

    <linearGradient id="wave-dark-3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#181822" />
      <stop offset="50%" stop-color="#101017" />
      <stop offset="100%" stop-color="#07070a" />
    </linearGradient>

    <!-- Deep neon highlight gradients for premium dark contrast -->
    <linearGradient id="neon-glow-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0055ff" stop-opacity="0" />
      <stop offset="50%" stop-color="#0088ff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="neon-glow-violet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7f00ff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </linearGradient>

    <!-- Blur filter for glowing lights -->
    <filter id="dark-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="70" />
    </filter>

    <!-- Soft drop shadow for wave depth -->
    <filter id="wave-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#dark-bg)" />

  <!-- Hidden colorful ambient light underneath (glowing edges look) -->
  <g filter="url(#dark-glow)">
    <circle cx="400" cy="500" r="300" fill="url(#neon-glow-violet)" />
    <circle cx="1500" cy="600" r="400" fill="#0055ff" opacity="0.08" />
  </g>

  <!-- Wave 1 (Back Dark Wave) -->
  <path d="M-100 650 Q 300 500 800 680 T 1700 580 Q 1860 560 2020 620 L 2020 1080 L -100 1080 Z" fill="url(#wave-dark-1)" filter="url(#wave-shadow)" />

  <!-- Neon highlight line (Blue glow path overlaying between waves) -->
  <path d="M-100 700 Q 350 630 850 720 T 1750 660" fill="none" stroke="url(#neon-glow-blue)" stroke-width="8" opacity="0.8" filter="url(#dark-glow)" />

  <!-- Wave 2 (Middle Dark Wave) -->
  <path d="M-100 750 Q 400 830 900 720 T 1800 770 Q 1910 790 2020 760 L 2020 1080 L -100 1080 Z" fill="url(#wave-dark-2)" filter="url(#wave-shadow)" />

  <!-- Wave 3 (Front Dark Wave) -->
  <path d="M-100 860 Q 300 780 750 880 T 1600 810 Q 1810 790 2020 850 L 2020 1080 L -100 1080 Z" fill="url(#wave-dark-3)" filter="url(#wave-shadow)" />
</svg>
